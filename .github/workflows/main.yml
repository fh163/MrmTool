name: Build MrmTool
on:
  # 关闭自动编译：提交汉化不触发打包
  # push:
  #   branches: [ master ]
  
  # 仅手动点击触发编译
  workflow_dispatch:

# ==============================================
# 👉 手动编译教程（忘记操作看这里）
# 1. 打开你的GitHub仓库 → 点击顶部「Actions」
# 2. 左侧选择「Build MrmTool」工作流
# 3. 右上角点击「Run workflow」→ 再次点击绿色按钮确认
# 4. 等待编译完成 → 下载Artifact → 解压后直接就是4个核心文件
# ==============================================

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: 'latest'

      - name: Resolve Visual Studio MSBuild path
        shell: powershell
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            Write-Error "vswhere not found: $vswhere"
            exit 1
          }
          $vsInstall = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $vsInstall) {
            Write-Error "Visual Studio with MSBuild component not found on this runner."
            exit 1
          }
          $vsDisplay = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property displayName
          $vsVersion = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property catalog_productDisplayVersion
          $msbuild = Join-Path $vsInstall "MSBuild\Current\Bin\MSBuild.exe"
          if (-not (Test-Path $msbuild)) {
            Write-Error "MSBuild.exe not found at: $msbuild"
            exit 1
          }
          "MSBUILD_EXE=$msbuild" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VS_INSTALL=$vsInstall" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using MSBuild: $msbuild"
          Write-Host "Visual Studio: $vsDisplay $vsVersion"

      - name: Remove global.json
        run: |
          if (Test-Path global.json) { Remove-Item global.json -Force }
          if (Test-Path "MrmTool\global.json") { Remove-Item "MrmTool\global.json" -Force }

      # 关键新增步骤：编译前强制清理所有缓存（bin/obj目录）
      - name: 彻底清理编译缓存（解决汉化不生效）
        run: |
          # 删除项目下所有 bin/obj 目录，确保编译全新版本
          Get-ChildItem -Path "MrmTool" -Directory -Recurse |
            Where-Object { $_.Name -in @("bin", "obj") } |
            ForEach-Object { Remove-Item -Path $_.FullName -Recurse -Force -ErrorAction SilentlyContinue }
          Write-Host "✅ 已清空所有bin/obj缓存目录"

      - name: Restore NuGet
        run: '& "${{ env.MSBUILD_EXE }}" MrmTool.sln /t:Restore /p:Configuration=Release /p:Platform=x64 /p:RestorePackagesConfig=true'

      # 新增Clean步骤：再次确保编译环境干净
      - name: 清理项目（Clean）
        run: '& "${{ env.MSBUILD_EXE }}" MrmTool.sln /t:Clean /p:Configuration=Release /p:Platform=x64'

      - name: 发布自包含单文件版本
        run: '& "${{ env.MSBUILD_EXE }}" MrmTool.sln /t:Publish /p:Configuration=Release /p:Platform=x64 /p:SelfContained=true /p:PublishSingleFile=true /p:RuntimeIdentifier=win-x64 /p:PublishProfile=win-x64 /p:PublishDir="MrmTool\bin\Release\net10.0-windows10.0.26100.0\win-x64\publish\"'

      - name: 校验发布目录并输出产物大小
        run: |
          $publishDir = Join-Path $pwd "MrmTool\bin\Release\net10.0-windows10.0.26100.0\win-x64\publish"
          if (-not (Test-Path $publishDir)) {
            Write-Error "发布目录不存在: $publishDir"
            exit 1
          }
          $exePath = Join-Path $publishDir "MrmTool.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "发布目录中未找到 MrmTool.exe: $exePath"
            exit 1
          }
          $sizeMB = [Math]::Round((Get-Item $exePath).Length / 1MB, 2)
          Write-Host "发布目录: $publishDir"
          Write-Host "MrmTool.exe 大小: $sizeMB MB"
          "PUBLISH_DIR=$publishDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # 只上传4个核心文件
      - name: 上传最终4个核心文件
        uses: actions/upload-artifact@v4
        with:
          name: MrmTool-x64
          path: |
            ${{ env.PUBLISH_DIR }}/MrmTool.exe
            ${{ env.PUBLISH_DIR }}/MrmLib.dll
            ${{ env.PUBLISH_DIR }}/WinUIEditor.dll
            ${{ env.PUBLISH_DIR }}/WinUIEditor.pri
            ${{ env.PUBLISH_DIR }}/resources.pri
        # path: ${{ env.PUBLISH_DIR }}/*  # 备用：打包所有文件
